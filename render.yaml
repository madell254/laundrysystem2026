services:
  - type: web
    name: laundry-system
    runtime: node
    plan: free
    buildCommand: npm install --omit=dev
    startCommand: npm run db:migrate && npm start
    healthCheckPath: /api/healthz
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: laundry-db
          property: connectionString
      - key: SESSION_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production
      - key: DISABLE_HTTPS
        value: "1"

databases:
  - name: laundry-db
    plan: free
